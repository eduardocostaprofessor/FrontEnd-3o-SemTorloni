<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo padrão BEM CSS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- block/bloco/componente -->
    <nav class="mae">
      <a href="#" class="mae__filho">Home</a>
      <a href="#" class="mae__filho">Quem Somos</a>
      <a href="#" class="mae__filho">Contato</a>
      <a href="#" class="mae__filho mae__filho--success">Entrar</a>
      <a href="#" class="mae__filho mae__filho--button-default">Cadastrar</a>

      <!-- componente/bloco -->
      <div class="card-perfil">
        <!-- elemento/element -->
        <img
          class="card-perfil__image"
          src="./images/mulher-perfil.avif"
          alt="foto de perfil do usuário"
        />
      </div>
    </nav>
  </body>
</html>
